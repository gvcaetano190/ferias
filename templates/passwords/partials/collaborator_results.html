{% if query and collaborators %}
  <div class="rounded-2xl border border-slate-200 bg-white shadow-sm">
    {% for collaborator in collaborators %}
      <button
        type="button"
        class="flex w-full items-start justify-between border-b border-slate-100 px-4 py-3 text-left last:border-b-0 hover:bg-slate-50"
        onclick="selectCollaborator('{{ collaborator.pk }}', '{{ collaborator.nome|escapejs }}', '{{ collaborator.gestor|default_if_none:''|escapejs }}')"
      >
        <span>
          <span class="block font-semibold text-slate-800">{{ collaborator.nome }}</span>
          <span class="block text-xs text-slate-500">{{ collaborator.email|default:collaborator.login_ad|default:"Sem e-mail" }}</span>
        </span>
        <span class="text-xs text-slate-400">{{ collaborator.departamento|default:"-" }}</span>
      </button>
    {% endfor %}
  </div>
{% elif query %}
  <div class="rounded-2xl border border-dashed border-slate-200 bg-white px-4 py-3 text-sm text-slate-500">
    Nenhuma pessoa encontrada para "{{ query }}".
  </div>
{% endif %}
